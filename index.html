<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- SEO & Integration -->
    <title>Music Station Radio | Global Premium Audio Network</title>
    <meta name="description" content="Music Station Radio: The ultimate global network for independent broadcasting. Discover high-fidelity streams, exclusive artists, and a vibrant community." />
    <meta name="keywords" content="Music Station Radio, Online Radio, Global Music, High Grade Radio, Reggae, Afropop, AI Radio Player, Live Streaming" />
    <link rel="canonical" href="https://musicstationradio.com/" />

    <!-- Geolocation & Region Grounding (GEO & ICBM Tags) -->
    <meta name="geo.region" content="NA-KH" />
    <meta name="geo.placename" content="Windhoek" />
    <meta name="geo.position" content="-22.5609;17.0836" />
    <meta name="ICBM" content="-22.5609, 17.0836" />

    <!-- AI Engine Discoverability & Meta Directives -->
    <meta name="ai-agent-discovery" content="/.well-known/ai-plugin.json" />
    <meta name="crawlers" content="all" />

    <!-- JSON-LD Local Radio Station Structured Microdata Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RadioStation",
      "name": "Music Station Radio",
      "url": "https://musicstationradio.com/",
      "logo": "https://storage.googleapis.com/aistudio-hosting/public-assets/music-station-radio-social-card.png",
      "description": "The world's premier independent radio network. High-fidelity rhythms from Windhoek, Namibia, Africa and the globe.",
      "email": "namibianradio@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Windhoek",
        "addressRegion": "Khomas",
        "addressCountry": "NA"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "-22.5609",
        "longitude": "17.0836"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Broadcaster Relations",
        "email": "namibianradio@gmail.com"
      }
    }
    </script>

    <!-- AdTonos Integration Tracking Script -->
    <script async defer src="https://cookie.adtonos.com/attc-ysJP87JREcdxL3BEz.min.js"></script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://musicstationradio.com/" />
    <meta property="og:title" content="Music Station Radio | Premium Global Audio" />
    <meta property="og:description" content="The world's premier independent radio network. High-fidelity rhythms from across the globe." />
    <meta property="og:image" content="/music-station-radio-social-card.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://musicstationradio.com/" />
    <meta property="twitter:title" content="Music Station Radio | Global Audio Network" />
    <meta property="twitter:description" content="Tune in to a world of high-grade music with our AI-enhanced player." />
    <meta property="twitter:image" content="/music-station-radio-social-card.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#00A8FF" />

    <!-- iOS support -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Station Radio">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
      document.documentElement.classList.add('dark');
    </script>
    
    <style>
      :root {
        --accent-color: #00A8FF;
        --accent-color-rgb: 0, 168, 255;
      }
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #030712;
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      .accent-color-text { color: var(--accent-color); }
      .accent-color-border { border-color: var(--accent-color); }
      .accent-color-bg { background-color: var(--accent-color); }

      @keyframes shine {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .featured-shine::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 100%
        );
        animation: shine 3s infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="dark selection:bg-[#00A8FF] selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Music Station Radio ServiceWorker registered with scope: ', reg.scope);
            })
            .catch(err => {
              console.error('Music Station Radio ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
